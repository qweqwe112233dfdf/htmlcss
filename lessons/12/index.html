<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            box-sizing: border-box;
        }
        form {
            width: 80vw;
            min-width: 500px;
            max-width: 1200px;

            border: black solid 2px;
            border-radius: 10px;

            background-color: bisque;

            margin: 0.7em auto;
            padding: 0.7em;

            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4em;
            flex-direction: column;

            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif
        }
        textarea {
            resize: none;
        }
    </style>
</head>
<body>
    <form action="" method="get">
        <input type="text" placeholder="What are you looking for?">
        <button type="submit">Search</button>
        <button type="reset">Reset</button>
        


    </form>
    <form>
        <div>
            <label for="username">Ім'я користувача:</label>
            <br>
            <input type="text" id="username" required>
        </div>
        <div>
            <label for="email">Email:</label>    
            <br>
            <input type="email" id="email" required>
        </div>
        <div>
            <label for="password">Пароль:</label>
            <br>
            <input type="password" id="password" required>
        </div>
        <div>
            <label for="about">про себе:</label>
            <br>
            <textarea id="about" cols="30" rows="10"></textarea>
        </div>
        <div>
            <label for="agree">Я погоджуюсь з умовами</label>
            <input type="checkbox" id="agree" required>
        </div>
        <fieldset>
            <legend>Стать: </legend>
            <input type="radio" name="gender" value="male" id="genderM">
            <label for="genderM">Чоловіча</label>
            <input type="radio" name="gender" value="female" id="genderF">
            <label for="genderF">Жіноча</label>
            <input type="radio" name="gender" value="other" id="genderO">
            <label for="genderO">Інша</label>
        </fieldset>
        <div>
            <label for="fav-pizza">Улюблена піца:</label>
            <br>
            <select name="fav-pizza" id="fav-pizza">
                <option value="margarita">Маргарита</option>
                <option value="pepperoni">Пепероні</option>
                <option value="hawaiian">Гавайська</option>
                <option value="veggie">Вегетаріанська</option>
            </select>
        </div>
        <div>
            <label for="fav-genre: ">Улюблений жанр ігор: </label>
            <br>
            <input type="text" name="genre" id="fav-genre" list="genres">
            <datalist id="genres">
                <option value="RPG">RPG</option>
                <option value="FPS">FPS</option>
                <option value="Strategy">Strategy</option>
                <option value="Adventure">Adventure</option>
                <option value="Simulation">Simulation</option>
            </datalist>
        </div>
        <div>
            <label for="birth-date">Дата народження: </label>
            <br>
            <input type="date" name="birth-date" id="birth-date">
        </div>
        <div>
            <label for="tall">Ваш зріст: </label>
            <br>
            <input type="number" name="tall" id="tall" max="300" min="1">
        </div>
        <div>
            <button type="submit">зареєструватися</button>
        </div>

    </form>
    
</body>
</html>
