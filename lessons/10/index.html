<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            background-color: antiquewhite;
        }

        .container {
            width: 100vw;
            max-width: 1200px;
            min-width: 320px;

            min-height: 100vh;
            height: auto;

            display: flex;
            flex-direction: column;

        }
        header {
            display: flex;
            align-items: center;
            justify-content: center;

            background-color: darkblue;
            color: cornsilk;
            flex-basis: 10vh;
        }
        main {
            flex-grow: 11;
            display: flex;
            flex-direction: row;
            flex-shrink: auto;
        }
        aside:first-child, aside:last-child {
            display: flex;
            align-items: center;
            justify-content: center;

            flex-basis: 20%;

        }
        aside:first-child {
            display: flex;
            align-items: center;
            justify-content: center;

            flex-basis: 20%;
        }
        aside:last-child {
            display: flex;
            align-items: center;
            justify-content: center;

            flex-basis: 20%;
        }
        main>section {
            display: flex;
            align-items: center;
            justify-content: center;

            flex-basis: 20%;

            background-color: grey;
            flex-grow: auto;
            flex-shrink: 11;

        }


        aside:first-child {
            background-color: coral;
        }
        aside:last-child {
            background-color: darkmagenta;
        }

        footer {
            display: flex;
            align-items: center;
            justify-content: center;

            background-color: darkolivegreen;
            color: cornsilk;
            flex-basis: 5vh;
        }
        @media screen and (max-width:960px) and (min-width:570px) {
            aside:last-child {
                display: none;
            }
            aside:first-child {
                flex-basis: 30%;
            }
            section {
                flex-basis: 70%;
            }
        }
        @media screen and (max-width:570px) {
            main {
                flex-direction: column-reverse;

            }
            aside {
                flex-basis: 20vh;
            }
            section {
                flex-basis: auto;
            }
            aside:last-child {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>HEADER</header>
        <main>
            <aside>LEFT SIDE</aside>
            <section>MIDDLE SECTION</section>
            <aside>RIGHT SIDE</aside>
        </main>
        <footer>FOOTER</footer>
    </div>
    
</body>
</html>
