<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 20px;
        }
        .table {
            width: 90%;
            margin: auto;
            border-collapse: collapse;
            text-align: center;
            background-color: white;

        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;


        }
        th:first-child,
        td:first-child {
            text-align: left;
            font-weight: bold;
            background-color: #f0f0f0;
        }
        th:nth-child(2) {
            background-color: #4a6cf7;
            color: white;
        }
        th:nth-child(3) {
            background-color: #3f5fe0;
            color: white;
        }
        th:nth-child(4) {
            background-color: #324ec0;
            color: white;        
        }
        th:last-child {
            background-color: #22378d;
            color: white;
        }
        tr:nth-child(even) td{
            background-color: white;
        }
        tr:last-child td:not(:first-child) {
            background-color: white;
        }
        button {
            padding: 8px 20px;
            border: none;
            background-color: #4a6cf7;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #324ec0;
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <th>Choose your plan</th>
            <th>Starter<br>$10</br>per month</th>
            <th>Econom<br>$30</br>per month</th>
            <th>Standart<br>59$</br>per month</th>
            <th>Professional<br>$99</br>per month</th>
        </tr>
        <tr>
            <td>Amount of space</td>
            <td>20GB</td>
            <td>40GB</td>
            <td>110GB</td>
            <td>Unlimited</td>
        </tr>
        <tr>
            <td>Bandwidth per month</td>
            <td>120GB</td>
            <td>240GB</td>
            <td>610GB</td>
            <td>1300GB</td>
        </tr>
        <tr>
            <td>Email accounts</td>
            <td>1</td>
            <td>15</td>
            <td>60</td>
            <td>Unlimited</td>
        </tr>

        <tr>
            <td>MySQL databases</td>
            <td>1</td>
            <td>15</td>
            <td>60</td>
            <td>Unlimited</td>
        </tr>
        <tr>
            <td>25h support</td>
            <td>No</td>
            <td>Yes</td>
            <td>Yes</td>
            <td>Yes</td>
        </tr>
        <tr>
            <td></td>
            <td><button>START</button></td>
            <td><button>START</button></td>
            <td><button>START</button></td>
            <td><button>START</button></td>


        </tr>
    </table>
    
</body>
</html>
