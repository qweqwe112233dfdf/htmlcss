<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .heart {
            font-size: 100px;
            filter: grayscale(100%);
            transition: all 5s ease 0s;

            color: red;

    <img src="/favorites.png" alt="heart" class="heart">
